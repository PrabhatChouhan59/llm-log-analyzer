# -----------------------------------------------------------
# Prometheus Configuration Values (for Helm chart)
# -----------------------------------------------------------
# Prometheus is a monitoring system that:
# 1. Periodically "scrapes" (fetches) /metrics endpoints from your apps
# 2. Stores those time-series metrics in a database
# 3. Lets Grafana query and visualize the data
#
# This file configures the Prometheus Helm chart.
# Install with: helm install prometheus prometheus-community/prometheus -f prometheus-values.yaml
# -----------------------------------------------------------

# Use a small server to save resources in our dev cluster
server:
  # Persistent storage for Prometheus database
  persistentVolume:
    enabled: true
    size: 8Gi

  # How long to keep metrics data (15 days is good for dev)
  retention: "15d"

  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# -----------------------------------------------------------
# Scrape Configuration: WHERE Prometheus pulls metrics FROM
# -----------------------------------------------------------
serverFiles:
  prometheus.yml:
    global:
      # Pull metrics every 15 seconds
      scrape_interval: 15s
      # Evaluate alerting rules every 15 seconds
      evaluation_interval: 15s

    scrape_configs:

      # --- Scrape Kubernetes pods with prometheus annotations ---
      # Any pod with annotation prometheus.io/scrape: "true" is scraped
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["devops-platform"]
        relabel_configs:
          # Only scrape pods with prometheus.io/scrape: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Use prometheus.io/path annotation for the metrics path
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Use prometheus.io/port annotation for the port
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Add pod name as a label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Add namespace as a label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace

      # --- Scrape log-generator metrics directly ---
      - job_name: "log-generator"
        static_configs:
          - targets: ["log-generator-service.devops-platform.svc.cluster.local:8000"]
        metrics_path: /metrics
        scrape_interval: 15s

      # --- Scrape llm-analyzer metrics ---
      - job_name: "llm-analyzer"
        static_configs:
          - targets: ["llm-analyzer-service.devops-platform.svc.cluster.local:8080"]
        metrics_path: /metrics
        scrape_interval: 30s

# Disable components we don't need to save resources
alertmanager:
  enabled: false

pushgateway:
  enabled: false

# Enable node exporter to get node-level metrics (CPU, Memory, Disk)
nodeExporter:
  enabled: true
