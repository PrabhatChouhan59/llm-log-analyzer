# -----------------------------------------------------------
# Service for Ollama AI Server
# -----------------------------------------------------------

apiVersion: v1
kind: Service
metadata:
  name: ollama-service
  namespace: devops-platform
  labels:
    app: ollama
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - name: api
      port: 11434       # Ollama's default API port
      targetPort: 11434
      protocol: TCP
